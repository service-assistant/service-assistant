name: service-assistant-production

services:
  db:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_production:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5434:5432"
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && fastapi run --host 0.0.0.0 --port 8000"
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - attachments:/attachments
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  pgdata_production:
  attachments:
