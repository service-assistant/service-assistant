{% extends "admin/base.html" %}

{% block title %}Edit Device{% endblock %}
{% block heading %}Edit Device{% endblock %}

{% block content %}
<section class="bg-white border border-gray-200 rounded-lg p-6 max-w-xl">
    <form method="post" action="/api/devices/{{ device.id }}"
          data-method="PATCH"
          data-redirect="/admin/devices"
          data-success-msg="Device saved."
          class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" name="name" required value="{{ device.name }}"
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Brand</label>
            <select name="brand_id" required
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                {% for brand in brands %}
                <option value="{{ brand.id }}" {% if brand.id == device.brand_id %}selected{% endif %}>{{ brand.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Device Type</label>
            <select name="device_type_id" required
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                {% for dt in device_types %}
                <option value="{{ dt.id }}" {% if dt.id == device.device_type_id %}selected{% endif %}>{{ dt.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Model / Serial code <span class="text-gray-400">(optional)</span></label>
            <input type="text" name="model_serial_code" value="{{ device.model_serial_code or '' }}"
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Image URL <span class="text-gray-400">(optional)</span></label>
            <input type="url" name="image_url" value="{{ device.image_url or '' }}"
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div class="col-span-2 flex items-center gap-3">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
                Save
            </button>
            <a href="/admin/devices" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
