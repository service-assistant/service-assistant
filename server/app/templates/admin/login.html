<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Service Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white border border-gray-200 rounded-lg shadow-sm px-8 py-10 w-full max-w-sm">
        <h1 class="text-xl font-semibold mb-1">Admin Panel</h1>
        <p class="text-sm text-gray-500 mb-6">Enter the admin token to continue.</p>

        <div id="login-error" class="hidden mb-4 px-4 py-3 rounded-md bg-red-50 border border-red-200 text-red-800 text-sm"></div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="token">Token</label>
                <input
                    id="token"
                    name="token"
                    type="password"
                    autocomplete="current-password"
                    class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    required
                />
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-md transition-colors">
                Log in
            </button>
        </form>
    </div>

    <script>
    document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const token = document.getElementById('token').value;
        const errEl = document.getElementById('login-error');
        errEl.classList.add('hidden');

        let resp;
        try {
            resp = await fetch('/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ token }),
            });
        } catch {
            errEl.textContent = 'Network error.';
            errEl.classList.remove('hidden');
            return;
        }

        const data = await resp.json();
        if (!resp.ok || data.error) {
            errEl.textContent = data.error || 'Login failed.';
            errEl.classList.remove('hidden');
        } else {
            localStorage.setItem('admin_token', token);
            window.location.href = data.redirect || '/admin/documents';
        }
    });
    </script>
</body>
</html>
