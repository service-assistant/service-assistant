{% extends "admin/base.html" %}

{% block title %}Edit Device Type{% endblock %}
{% block heading %}Edit Device Type{% endblock %}

{% block content %}
<section class="bg-white border border-gray-200 rounded-lg p-6 max-w-md">
    <form method="post" action="/admin/device_types/{{ device_type.id }}/edit" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" name="name" required value="{{ device_type.name }}"
                class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div class="flex items-center gap-3">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-md transition-colors">
                Save
            </button>
            <a href="/admin/device_types" class="text-sm text-gray-500 hover:text-gray-700">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
