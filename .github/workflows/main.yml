name: Main workflow

on:
  push:
    branches:
      - "staging"
  pull_request:
    branches:
      - "**"

jobs:
  client-lint:
    name: Lint (client)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Run lint check
        run: npm --prefix ./client run lint

  client-format-check:
    name: Check formatting (client)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Run format check
        run: cd client && npm exec prettier -- --check .

  client-test:
    name: Run tests (client)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Run tests
        run: npm --prefix ./client test

  server-lint:
    name: Lint (server)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry
      - name: Install dependencies
        run: poetry --directory ./server install --all-groups
      - name: Run lint check
        run: poetry --directory ./server run ruff check app tests

  server-format-check:
    name: Check formatting (server)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry
      - name: Install dependencies
        run: poetry --directory ./server install --all-groups
      - name: Run format check
        run: poetry --directory ./server run ruff format --check app tests

  server-typecheck:
    name: Type check (server)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry
      - name: Install dependencies
        run: poetry --directory ./server install --all-groups
      - name: Run type check
        run: poetry --directory ./server run pyright

  server-test:
    name: Run tests (server)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:pg18-trixie
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: service_assistant_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-poetry
      - name: Install dependencies
        run: poetry --directory ./server install --all-groups
      - name: Run tests
        run: poetry --directory ./server run pytest
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5433/service_assistant_test
